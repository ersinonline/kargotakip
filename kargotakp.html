<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ersinonline Kargo Takip Sistemi</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background-color: #f2f2f2;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
            margin-bottom: 20px;
        }
        .container h1 {
            margin-bottom: 10px;
            font-size: 1.4em;
        }
        .container input, .container button, .container select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-size: 0.9em;
        }
        .container button {
            background-color: #ffb700;
            color: white;
            border: none;
            cursor: pointer;
        }
        .container button:hover {
            background-color: #e6a700;
        }
        .logo {
            margin-bottom: 10px;
            width: 100px; /* İstenilen boyuta ayarlayabilirsiniz */
            height: 100px; /* İstenilen boyuta ayarlayabilirsiniz */
            border-radius: 50%; /* Yuvarlak köşeler ekler */
            overflow: hidden; /* Gereksiz içeriklerin gösterilmemesini sağlar */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://startupmarket.co/cache/300x300/upload/images/startup/65ae21f00c7b9386638317.jpg" alt="ersinonline Logo" class="logo">
        <h1>ersinonline Kargo Takip Sistemi</h1>
        <form id="trackForm">
            <input type="text" id="trackingNumber" placeholder="Kargo Takip Numarası" required>
            <select id="cargoCompany" required>
                <option value="" disabled selected>Kargo Firması Seçin</option>
                <option value="suratkargo">Sürat Kargo</option>
                <option value="sendeo-kargo">Sendeo Kargo</option>
                <option value="hepsijet">Hepsijet</option>
                <option value="ptt-kargo">PTT Kargo</option>
                <option value="kolay-gelsin">Kolay Gelsin</option>
            </select>
            <button type="submit">Takip Et</button>
        </form>
    </div>
    <script>
        document.getElementById('trackForm').addEventListener('submit', function(event) {
            event.preventDefault();
            var trackingNumber = document.getElementById('trackingNumber').value.trim();
            var cargoCompany = document.getElementById('cargoCompany').value;

            if (trackingNumber && cargoCompany) {
                var url = '';
                if (cargoCompany === 'suratkargo') {
                    url = `https://suratkargo.com.tr/KargoTakip/?KARGOTAKIPNO=${trackingNumber}`;
                } else if (cargoCompany === 'sendeo-kargo') {
                    url = `https://sendeo.com.tr/tracking?q=${trackingNumber}&qid=`;
                } else if (cargoCompany === 'hepsijet') {
                    url = `https://hepsijet.com/gonderi-takibi/${trackingNumber}`;
                } else if (cargoCompany === 'ptt-kargo') {
                    url = `https://kargomnerede.com.tr/m/ersinonline-fotokopi`;
                } else if (cargoCompany === 'kolay-gelsin') {
                    url = `https://esube.kolaygelsin.com/shipments/?trackingId=${trackingNumber}&lang=TR`;
                }
                window.open(url, '_blank');
            }
        });
    </script>
</body>
</html>
